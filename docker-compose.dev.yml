services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: buku-backend-dev
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      PORT: 3011
      NODE_ENV: development
      DB_PATH: /app/data/buku.db
    volumes:
      - ./backend/src:/app/src
      - ./backend/data:/app/data
    ports:
      - "127.0.0.1:3011:3011"
    networks:
      - buku_dev_net

networks:
  buku_dev_net:
    driver: bridge
